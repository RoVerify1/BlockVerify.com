<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoboPrompt AI</title>

<style>
:root {
    --bg: #0a0a0b;
    --panel: #111113;
    --border: #27272a;
    --accent: #f97316;
    --text: #fff;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 260px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 20px;
}

.logo {
    font-weight: bold;
    font-size: 18px;
    margin-bottom: 30px;
}

/* Chat */
.chat {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.messages {
    flex: 1;
    padding: 30px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* Messages */
.msg {
    max-width: 600px;
    padding: 14px;
    border-radius: 10px;
    animation: fadeUp 0.3s ease;
}

.user {
    background: #1c1c1f;
    align-self: flex-end;
}

.ai {
    border-left: 3px solid var(--accent);
}

/* Animation */
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Input */
.input {
    padding: 20px;
    border-top: 1px solid var(--border);
    display: flex;
}

input {
    flex: 1;
    padding: 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: white;
}

button {
    margin-left: 10px;
    padding: 12px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

/* Typing dots */
.typing {
    display: flex;
    gap: 5px;
}

.dot {
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
    animation: bounce 1.4s infinite;
}

@keyframes bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
}
</style>
</head>

<body>

<div class="sidebar">
    <div class="logo">🤖 RoboPrompt</div>
</div>

<div class="chat">
    <div class="messages" id="chatBox">
        <div class="msg ai">Hallo! Was soll ich bauen?</div>
    </div>

    <div class="input">
        <input id="input" placeholder="z.B. Car Script...">
        <button onclick="send()">Senden</button>
    </div>
</div>

<script>
function add(text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.textContent = text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function typing() {
    const div = document.createElement("div");
    div.className = "msg ai";
    div.innerHTML = `<div class="typing">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>`;
    chatBox.appendChild(div);
    return div;
}

function send() {
    const input = document.getElementById("input");
    if (!input.value) return;

    add(input.value, "user");

    const t = typing();

    setTimeout(() => {
        t.remove();
        add("Hier ist dein Script 🚀", "ai");
    }, 1200);

    input.value = "";
}
</script>

</body>
</html>
