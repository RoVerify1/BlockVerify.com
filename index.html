<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox AI Studio</title>

<style>
:root {
    --bg: #0a0a0b;
    --panel: #111113;
    --border: #27272a;
    --text: #ffffff;
    --muted: #888;
    --accent: #f97316;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 260px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 20px;
}

.brand {
    font-weight: bold;
    font-size: 18px;
    margin-bottom: 30px;
}

.history {
    color: var(--muted);
    font-size: 14px;
}

/* Chat */
.chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* Messages */
.messages {
    flex: 1;
    padding: 40px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* Message bubbles */
.message {
    max-width: 700px;
    padding: 14px 18px;
    border-radius: 10px;
    line-height: 1.5;
}

.user {
    background: #1c1c1f;
    align-self: flex-end;
}

.ai {
    background: transparent;
    border-left: 3px solid var(--accent);
    padding-left: 12px;
}

/* Input */
.input-area {
    padding: 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: center;
}

.input-box {
    width: 100%;
    max-width: 800px;
    display: flex;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
}

input {
    flex: 1;
    padding: 14px;
    background: transparent;
    border: none;
    color: white;
}

button {
    padding: 14px 20px;
    background: var(--accent);
    border: none;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #ea580c;
}

/* Code block */
.code {
    background: black;
    color: #22c55e;
    padding: 6px;
    border-radius: 4px;
    font-family: monospace;
}
</style>
</head>

<body>

<div class="sidebar">
    <div class="brand">🔥 Roblox AI</div>
    <div class="history">Keine Chats</div>
</div>

<div class="chat-area">
    <div class="messages" id="chatBox">
        <div class="message ai">Hallo! Was soll ich für dein Roblox-Spiel bauen?</div>
    </div>

    <div class="input-area">
        <div class="input-box">
            <input id="userInput" placeholder="z.B. Car Script...">
            <button onclick="send()">Senden</button>
        </div>
    </div>
</div>

<script>
function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "message " + type;
    div.textContent = text;

    document.getElementById("chatBox").appendChild(div);
    scrollDown();
}

function addHTML(html) {
    const div = document.createElement("div");
    div.className = "message ai";
    div.innerHTML = html;

    document.getElementById("chatBox").appendChild(div);
    scrollDown();
}

function scrollDown() {
    const box = document.getElementById("chatBox");
    box.scrollTop = box.scrollHeight;
}

function send() {
    const input = document.getElementById("userInput");
    if (!input.value) return;

    addMessage(input.value, "user");

    addMessage("Generiere Script...", "ai");

    const code = Math.floor(1000 + Math.random() * 9000);

    setTimeout(() => {
        addHTML(`Fertig! Nutze Code <span class="code">${code}</span>`);
    }, 1200);

    input.value = "";
}
</script>

</body>
</html>
