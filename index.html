<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwen AI Roblox Generator</title>
    <style>
        :root { --bg: #0d1117; --panel: #161b22; --text: #c9d1d9; --accent: #238636; --error: #da3633; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; height: 100vh; }
        .container { width: 100%; max-width: 700px; display: flex; flex-direction: column; background: var(--panel); border: 1px solid #30363d; border-radius: 6px; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { padding: 16px; border-bottom: 1px solid #30363d; font-weight: 600; font-size: 1.2em; display: flex; align-items: center; gap: 10px; }
        .chat-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; min-height: 400px; }
        .message { padding: 12px 16px; border-radius: 6px; max-width: 85%; line-height: 1.5; word-wrap: break-word; font-size: 0.95em; }
        .user { align-self: flex-end; background: #1f6feb; color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #21262d; border: 1px solid #30363d; border-bottom-left-radius: 2px; }
        .error-msg { align-self: center; background: rgba(218, 54, 51, 0.15); border: 1px solid var(--error); color: #ff7b72; padding: 10px; border-radius: 6px; width: 90%; text-align: center; }
        .code-box { background: #0d1117; border: 1px solid #30363d; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 0.85em; color: #58a6ff; margin-top: 8px; cursor: pointer; position: relative; }
        .code-box:hover { border-color: #58a6ff; }
        .copy-hint { font-size: 0.7em; color: #8b949e; text-align: right; margin-top: 4px; }
        .input-area { padding: 16px; border-top: 1px solid #30363d; display: flex; gap: 10px; background: #161b22; border-radius: 0 0 6px 6px; }
        input { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; outline: none; }
        input:focus { border-color: #58a6ff; }
        button { padding: 10px 20px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        button:hover { background: #2ea043; }
        button:disabled { background: #30363d; cursor: not-allowed; }
        .loading { color: #8b949e; font-style: italic; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">🤖 Qwen Roblox Script Generator</div>
        <div class="chat-area" id="chat">
            <div class="message ai">Hallo! Beschreibe dein Roblox Script. Ich generiere den Code und lade ihn auf GitHub.</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Was soll das Script machen?" onkeypress="if(event.key==='Enter') sendMessage()">
            <button id="sendBtn" onclick="sendMessage()">Generieren</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const btn = document.getElementById('sendBtn');
            const chat = document.getElementById('chat');
            const text = input.value.trim();
            
            if (!text) return;

            // User Nachricht anzeigen
            chat.innerHTML += `<div class="message user">${text}</div>`;
            input.value = '';
            chat.scrollTop = chat.scrollHeight;
            
            // Loading Status
            const loadingId = 'loading-' + Date.now();
            chat.innerHTML += `<div id="${loadingId}" class="message ai loading">Qwen denkt nach und verbindet mit GitHub...</div>`;
            chat.scrollTop = chat.scrollHeight;
            
            btn.disabled = true;

            try {
                const response = await fetch('api.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text })
                });

                // WICHTIG: Erst den Text holen, dann parsen
                const rawText = await response.text(); 
                let data;
                
                try {
                    data = JSON.parse(rawText);
                } catch (e) {
                    throw new Error("Server antwortete mit ungültigem JSON: " + rawText.substring(0, 100));
                }

                // Loading entfernen
                const loadingEl = document.getElementById(loadingId);
                if(loadingEl) loadingEl.remove();

                if (data.success) {
                    chat.innerHTML += `
                        <div class="message ai">
                            ✅ Fertig! Code wurde auf GitHub gepusht.<br><br>
                            <strong>Installations-Code für Roblox Plugin:</strong>
                            <div class="code-box" onclick="navigator.clipboard.writeText('${data.code}'); alert('Kopiert!');" title="Klicken zum Kopieren">
                                ${data.code}
                            </div>
                            <div class="copy-hint">Klicken zum Kopieren</div>
                            <div style="margin-top:10px; font-size:0.8em; color:#8b949e;">
                                <a href="${data.url}" target="_blank" style="color:#58a6ff;">Auf GitHub ansehen</a>
                            </div>
                        </div>
                    `;
                } else {
                    // Hier war der Fehler: Wir müssen data.error nutzen, nicht das ganze Objekt
                    const errorMsg = data.error || "Unbekannter Fehler";
                    chat.innerHTML += `<div class="error-msg">❌ Fehler: ${errorMsg}</div>`;
                    
                    // Zusätzliche Info für dich in der Konsole (F12 drücken im Browser)
                    console.error("Detaillierter Fehler vom Server:", data);
                }
            } catch (err) {
                const loadingEl = document.getElementById(loadingId);
                if(loadingEl) loadingEl.remove();
                
                chat.innerHTML += `<div class="error-msg">❌ Verbindungsfehler: ${err.message}</div>`;
                console.error("Netzwerkfehler:", err);
            } finally {
                btn.disabled = false;
                chat.scrollTop = chat.scrollHeight;
            }
        }
    </script>
</body>
</html>
