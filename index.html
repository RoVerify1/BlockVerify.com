<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox AI Script Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @keyframes ripple {
            to { transform: scale(4); opacity: 0; }
        }

        .ripple {
            position: absolute;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: scale(0);
            animation: ripple 0.6s linear;
            pointer-events: none;
        }

        .fade-in {
            opacity: 0;
            transform: translateY(10px);
            animation: fadeIn 0.3s forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }
    </style>
</head>

<body class="bg-[#1e1e1e] text-gray-200 h-screen flex flex-col overflow-hidden">

<header class="h-16 bg-[#171717] border-b border-white/10 flex items-center justify-between px-6">
    <h1 class="font-bold text-xl">🤖 Roblox AI Architect</h1>
</header>

<main class="flex-1 flex flex-col">

    <div id="chatMessages" class="flex-1 overflow-y-auto p-6 space-y-4">

        <div class="flex gap-3">
            <div class="w-8 h-8 bg-purple-600 rounded-full flex items-center justify-center">AI</div>
            <div class="bg-[#2c2c2c] p-3 rounded-lg">
                Hallo! Was soll ich für Roblox bauen? 🚀
            </div>
        </div>

    </div>

    <footer class="p-4 bg-[#171717] flex gap-2 relative">
        <input id="userInput"
               class="flex-1 p-3 rounded bg-[#2c2c2c] text-white outline-none"
               placeholder="z.B. Car Script erstellen..." />

        <button onclick="sendRequest(event)"
                class="bg-blue-500 px-4 py-2 rounded relative overflow-hidden">
            Senden
        </button>
    </footer>

</main>

<script>
function createRipple(event) {
    const button = event.currentTarget;
    const circle = document.createElement("span");

    const size = Math.max(button.clientWidth, button.clientHeight);
    circle.style.width = circle.style.height = size + "px";

    const rect = button.getBoundingClientRect();
    circle.style.left = event.clientX - rect.left - size/2 + "px";
    circle.style.top = event.clientY - rect.top - size/2 + "px";

    circle.classList.add("ripple");

    button.appendChild(circle);

    setTimeout(() => circle.remove(), 600);
}

function scrollToBottom() {
    const chat = document.getElementById("chatMessages");
    chat.scrollTop = chat.scrollHeight;
}

async function sendRequest(event) {
    createRipple(event);

    const input = document.getElementById("userInput");
    const chatBox = document.getElementById("chatMessages");
    const userText = input.value.trim();

    if (!userText) return;

    // USER MESSAGE
    chatBox.innerHTML += `
        <div class="flex justify-end fade-in">
            <div class="bg-[#2c2c2c] p-3 rounded-lg max-w-[70%]">
                ${userText}
            </div>
        </div>
    `;

    input.value = "";
    scrollToBottom();

    // THINKING
    const thinkingId = "thinking_" + Date.now();

    chatBox.innerHTML += `
        <div id="${thinkingId}" class="flex gap-3 fade-in">
            <div class="w-8 h-8 bg-purple-600 rounded-full flex items-center justify-center">AI</div>
            <div class="text-gray-400 italic">Generiere Script...</div>
        </div>
    `;

    scrollToBottom();

    try {
        const response = await fetch("https://dein-projektname.vercel.app/api/generate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt: userText })
        });

        const data = await response.json();

        document.getElementById(thinkingId).remove();

        if (data.success) {
            chatBox.innerHTML += `
                <div class="flex gap-3 fade-in">
                    <div class="w-8 h-8 bg-purple-600 rounded-full flex items-center justify-center">AI</div>
                    <div class="bg-[#2c2c2c] p-3 rounded-lg max-w-[70%]">
                        <div>Script erstellt 🚀</div>
                        <div class="mt-2 text-blue-400 font-mono text-lg">
                            ${data.connectCode}
                        </div>
                    </div>
                </div>
            `;
        } else {
            chatBox.innerHTML += `<div class="text-red-400">Fehler: ${data.message}</div>`;
        }

    } catch (err) {
        document.getElementById(thinkingId).remove();
        chatBox.innerHTML += `<div class="text-red-400">Server nicht erreichbar ❌</div>`;
    }

    scrollToBottom();
}
</script>

</body>
</html>
