<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Qwen Roblox Generator</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; display: flex; justify-content: center; height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 600px; background: #161b22; border: 1px solid #30363d; margin-top: 50px; border-radius: 8px; display: flex; flex-direction: column; }
        .chat { flex: 1; padding: 20px; overflow-y: auto; min-height: 300px; }
        .msg { padding: 10px; border-radius: 6px; margin-bottom: 10px; max-width: 80%; }
        .user { background: #1f6feb; color: white; align-self: flex-end; margin-left: auto; }
        .ai { background: #21262d; border: 1px solid #30363d; }
        .error { background: #4c1a1a; border: 1px solid #da3633; color: #ff7b72; width: 90%; margin: 0 auto; text-align: center; }
        .code-box { background: #000; padding: 10px; border: 1px solid #30363d; color: #58a6ff; font-family: monospace; cursor: pointer; margin-top: 5px; }
        input { flex: 1; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 4px; }
        button { padding: 10px 20px; background: #238636; color: white; border: none; border-radius: 4px; cursor: pointer; margin-left: 10px; }
        .input-area { padding: 15px; border-top: 1px solid #30363d; display: flex; }
    </style>
</head>
<body>
<div class="container">
    <div style="padding:15px; border-bottom:1px solid #30363d; font-weight:bold;">🤖 Qwen AI Generator</div>
    <div class="chat" id="chat">
        <div class="msg ai">Hallo! Gib einen Befehl ein (z.B. 'Erstelle ein Anti-Cheat').</div>
    </div>
    <div class="input-area">
        <input type="text" id="inp" placeholder="Beschreibe dein Script..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()" id="btn">Senden</button>
    </div>
</div>

<script>
async function send() {
    const inp = document.getElementById('inp');
    const btn = document.getElementById('btn');
    const chat = document.getElementById('chat');
    const txt = inp.value.trim();
    if(!txt) return;

    chat.innerHTML += `<div class="msg user">${txt}</div>`;
    inp.value = '';
    chat.scrollTop = chat.scrollHeight;
    
    const loadId = 'l'+Date.now();
    chat.innerHTML += `<div id="${loadId}" class="msg ai">⏳ Generiere...</div>`;
    btn.disabled = true;

    try {
        const res = await fetch('api.php', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({prompt: txt})
        });

        // WICHTIG: Erst Text holen, dann versuchen zu parsen
        const raw = await res.text();
        let data;
        try {
            data = JSON.parse(raw);
        } catch(e) {
            throw new Error("Server antwortete kein JSON: " + raw.substring(0, 150));
        }

        document.getElementById(loadId).remove();

        if(data.success) {
            chat.innerHTML += `
                <div class="msg ai">
                    ✅ Erfolg!<br>
                    Code zum Kopieren:
                    <div class="code-box" onclick="navigator.clipboard.writeText('${data.code}');alert('Kopiert!')">${data.code}</div>
                    <small><a href="${data.url}" target="_blank" style="color:#58a6ff">Auf GitHub ansehen</a></small>
                </div>`;
        } else {
            // Hier wird der echte Fehlertext ausgegeben
            const errText = typeof data.error === 'object' ? JSON.stringify(data.error) : data.error;
            chat.innerHTML += `<div class="msg error">❌ Fehler: ${errText}</div>`;
            console.error("Detailfehler:", data);
        }
    } catch(e) {
        if(document.getElementById(loadId)) document.getElementById(loadId).remove();
        chat.innerHTML += `<div class="msg error">❌ Netzwerkfehler: ${e.message}</div>`;
        console.error(e);
    } finally {
        btn.disabled = false;
        chat.scrollTop = chat.scrollHeight;
    }
}
</script>
</body>
</html>
